# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

# Apps
bind = Super, S, exec, spotify # Spotify
bind = Ctrl+Super, P, exec, ~/.config/hypr/custom/scripts/toggle_presentation.sh # Toggle presentation mode (display off, system awake)
bind = Ctrl+Super, L, exec, hyprctl dispatch exit # Log out
bind = Ctrl+Super+Shift, R, exec, systemctl reboot # Reboot
bind = Ctrl+Super+Shift, P, exec, systemctl poweroff # Poweroff
bind = Super, R, exec, unshare -r -n reaper # Reaper

# Brightness (via volume keys) — controls focused monitor
bindle = Ctrl, XF86AudioRaiseVolume, exec, ~/.config/hypr/custom/scripts/brightness_control.sh up
bindle = Ctrl, XF86AudioLowerVolume, exec, ~/.config/hypr/custom/scripts/brightness_control.sh down

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above
